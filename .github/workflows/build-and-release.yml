name: Build and Release MDK

on:
  push:
    paths:
      - 'version'
      - '.github/workflows/build-and-release.yml'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            asset_os_name: Win64
          - os: ubuntu-latest
            asset_os_name: Linux
          - os: macos-latest
            asset_os_name: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from file
        id: get_version
        shell: bash
        run: |
          V=$(sed 's/[[:space:]]//g' version)
          if [ -z "$V" ]; then
            echo "Error: Version file is empty or invalid"
            exit 1
          fi
          echo "VERSION=$V" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          sudo mkdir -p /usr/local/lib/pkgconfig
          printf 'prefix=/usr\nexec_prefix=${prefix}\nlibdir=/usr/lib\nincludedir=${prefix}/include\n\nName: WebKitGTK\nDescription: Web content engine for GTK\nURL: https://webkitgtk.org\nVersion: 2.52.3\nRequires: glib-2.0 gtk+-3.0 libsoup-3.0 javascriptcoregtk-4.1\nLibs: -L${libdir} -lwebkit2gtk-4.1\nCflags: -I${includedir}/webkitgtk-4.1\n' | sudo tee /usr/local/lib/pkgconfig/webkit2gtk-4.0.pc > /dev/null
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install mingw -y --no-progress

      - name: Build with Wails
        shell: bash
        run: wails build

      - name: Zip the build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd build/bin
          if [ -f ModpackDebuggerKit.exe ]; then
            7z a -tzip ../../ModpackDebuggerKit_${{ env.VERSION }}_${{ matrix.asset_os_name }}.zip ModpackDebuggerKit.exe
          else
            echo "ERROR: ModpackDebuggerKit.exe not found"
            ls -la
            exit 1
          fi

      - name: Zip the build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd build/bin
          if [ -d ModpackDebuggerKit.app ]; then
            zip -r ../../ModpackDebuggerKit_${{ env.VERSION }}_macOS.zip ModpackDebuggerKit.app
          elif [ -f ModpackDebuggerKit ]; then
            zip -r ../../ModpackDebuggerKit_${{ env.VERSION }}_macOS.zip ModpackDebuggerKit
          else
            echo "ERROR: Neither ModpackDebuggerKit.app nor ModpackDebuggerKit found"
            ls -la
            exit 1
          fi

      - name: Zip the build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd build/bin
          if [ -f ModpackDebuggerKit ]; then
            zip -r ../../ModpackDebuggerKit_${{ env.VERSION }}_Linux.zip ModpackDebuggerKit
          else
            echo "ERROR: ModpackDebuggerKit not found"
            ls -la
            exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModpackDebuggerKit_${{ env.VERSION }}_${{ matrix.asset_os_name }}
          path: ModpackDebuggerKit_${{ env.VERSION }}_${{ matrix.asset_os_name }}.zip

  release:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize version info
        id: version
        shell: bash
        run: |
          VERSION=$(sed 's/[[:space:]]//g' version)
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+(\.[0-9]+)?(-(alpha|beta|rc)\.[0-9]+)?$'; then
            echo "Invalid VERSION format: $VERSION"
            echo "Expected formats: 0.1, 1.0.5, 1.2-rc.1, 2.0.1-beta.3, 2.1-alpha.4"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ $VERSION =~ -(alpha|beta|rc)\.[0-9]+$ ]]; then
            TYPE_UPPER=$(echo "${BASH_REMATCH[1]}" | tr '[:lower:]' '[:upper:]')
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_banner=🚨 ${TYPE_UPPER} RELEASE (pre-release)" >> $GITHUB_OUTPUT
            if [ "$TYPE_UPPER" = "BETA" ]; then
              ARTICLE="a"
            else
              ARTICLE="an"
            fi
            echo "release_notice=This is ${ARTICLE} ${TYPE_UPPER} pre-release. Do not use in production." >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_banner=📦 RELEASE" >> $GITHUB_OUTPUT
            echo "release_notice=This is an official release." >> $GITHUB_OUTPUT
          fi
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag already exists: $VERSION"
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          if [ "${{ steps.version.outputs.is_prerelease }}" = "true" ]; then
            LATEST_EARLY=$(git tag --sort=-creatordate | grep -v "${{ steps.version.outputs.version }}" | grep -E '\-(alpha|beta|rc)\.[0-9]+$' | head -n1 || true)
            LATEST_RELEASE=$(git tag --sort=-creatordate | grep -v "${{ steps.version.outputs.version }}" | grep -Ev '\-(alpha|beta|rc)\.[0-9]+$' | head -n1 || true)
            if [ -n "$LATEST_EARLY" ] && [ -n "$LATEST_RELEASE" ]; then
              EARLY_DATE=$(git for-each-ref --format='%(creatordate:unix)' "refs/tags/$LATEST_EARLY")
              RELEASE_DATE=$(git for-each-ref --format='%(creatordate:unix)' "refs/tags/$LATEST_RELEASE")
              if [ "$RELEASE_DATE" -ge "$EARLY_DATE" ]; then
                PREV_TAG="$LATEST_RELEASE"
              else
                PREV_TAG="$LATEST_EARLY"
              fi
            else
              PREV_TAG="$LATEST_EARLY$LATEST_RELEASE"
            fi
          else
            PREV_TAG=$(git tag --sort=-creatordate | grep -v "${{ steps.version.outputs.version }}" | grep -Ev '\-(alpha|beta|rc)\.[0-9]+$' | head -n1 || true)
          fi
          CHANGES_FILE="/tmp/changelog_lines.txt"
          > "$CHANGES_FILE"
          if [ -n "$PREV_TAG" ]; then
            LOG_RANGE="$PREV_TAG..HEAD"
          else
            LOG_RANGE="HEAD"
          fi
          declare -A SECTION_FILES
          SECTION_FILES[Features]="/tmp/ch_feat.txt"
          SECTION_FILES[Fixes]="/tmp/ch_fix.txt"
          SECTION_FILES[Docs]="/tmp/ch_docs.txt"
          SECTION_FILES[Perf]="/tmp/ch_perf.txt"
          SECTION_FILES[Refactor]="/tmp/ch_refactor.txt"
          SECTION_FILES[Style]="/tmp/ch_style.txt"
          SECTION_FILES[Tests]="/tmp/ch_tests.txt"
          SECTION_FILES[Chores]="/tmp/ch_chores.txt"
          SECTION_FILES[Reverts]="/tmp/ch_revert.txt"
          SECTION_FILES[Build]="/tmp/ch_build.txt"
          SECTION_FILES[CI]="/tmp/ch_ci.txt"
          SECTION_FILES[Other]="/tmp/ch_other.txt"
          for f in "${SECTION_FILES[@]}"; do > "$f"; done
          COMMIT_LINES=$(git log --pretty=format:'%h%x09%s' $LOG_RANGE)
          if [ -z "$COMMIT_LINES" ]; then
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "This release has no changes." >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "$COMMIT_LINES" | while IFS=$'\t' read -r h s; do
            type=$(echo "$s" | sed -nE 's/^([a-zA-Z-]+)(\([^)]*\))?:.*/\1/p' | tr '[:upper:]' '[:lower:]' || echo "other")
            desc=$(echo "$s" | sed -E 's/^([a-zA-Z-]+)(\([^)]*\))?:\s*(.*)$/\3/' | sed 's/^[|]//')
            if [ -z "$desc" ]; then desc="$s"; fi
            desc=$(echo "$desc" | sed -E "s|#([0-9]+)|[#\1]($REPO_URL/issues/\1)|g")
            line="- $desc ([${h}]($REPO_URL/commit/${h}))"
            case "$type" in
              feat|feature) echo "$line" >> "${SECTION_FILES[Features]}" ;;
              fix) echo "$line" >> "${SECTION_FILES[Fixes]}" ;;
              docs|doc) echo "$line" >> "${SECTION_FILES[Docs]}" ;;
              perf|performance) echo "$line" >> "${SECTION_FILES[Perf]}" ;;
              refactor) echo "$line" >> "${SECTION_FILES[Refactor]}" ;;
              style) echo "$line" >> "${SECTION_FILES[Style]}" ;;
              test|tests) echo "$line" >> "${SECTION_FILES[Tests]}" ;;
              chore|chores) echo "$line" >> "${SECTION_FILES[Chores]}" ;;
              revert|reverts) echo "$line" >> "${SECTION_FILES[Reverts]}" ;;
              build) echo "$line" >> "${SECTION_FILES[Build]}" ;;
              ci|actions-workflow) echo "$line" >> "${SECTION_FILES[CI]}" ;;
              *) echo "$line" >> "${SECTION_FILES[Other]}" ;;
            esac
          done
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" >> $GITHUB_OUTPUT
          else
            if [ "${{ steps.version.outputs.is_prerelease }}" == "true" ]; then
              echo "## First Early Release" >> $GITHUB_OUTPUT
            else
              echo "## First Release" >> $GITHUB_OUTPUT
            fi
          fi
          echo "" >> $GITHUB_OUTPUT
          for section in Features Fixes Docs Perf Refactor Style Tests Chores Reverts Build CI Other; do
            file="${SECTION_FILES[$section]}"
            if [ -s "$file" ]; then
              echo "### $section" >> $GITHUB_OUTPUT
              cat "$file" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi
          done
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare release body
        id: body
        shell: bash
        run: |
          BODY_FILE="/tmp/release_body.md"
          > "$BODY_FILE"
          if [ -f verdesc ] && [ -s verdesc ]; then
            cat verdesc >> "$BODY_FILE"
            printf "\n\n---\n\n" >> "$BODY_FILE"
          fi
          {
            echo "${{ steps.version.outputs.release_banner }}"
            echo "${{ steps.version.outputs.release_notice }}"
            echo "### Build Information"
            echo "- Version: ${{ steps.version.outputs.version }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Branch: ${{ github.ref_name }}"
            echo "- Built: ${{ github.event.head_commit.timestamp }}"
            echo "${{ steps.changelog.outputs.changelog }}"
          } >> "$BODY_FILE"
          echo "path=$BODY_FILE" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: ${{ steps.body.outputs.path }}
          files: |
            artifacts/*/*.zip
          draft: false
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
